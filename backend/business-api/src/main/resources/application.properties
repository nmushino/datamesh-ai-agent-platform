# ===== DataSource =====
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:dronedb}
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

# ===== Flyway =====
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ===== Kafka =====
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# NOTE: lazy-client=true で Kafka producer の生成を初回送信時まで遅延させる。
# Skupper 経由の Kafka 仮想 Service が未確立/到達不可の場合でも、
# アプリ起動自体をブロックしないようにするため (bootstrap.servers の名前解決
# 失敗が起動時の致命的エラーになるのを防ぐ)。
mp.messaging.outgoing.customer-events.connector=smallrye-kafka
mp.messaging.outgoing.customer-events.topic=customer-events
mp.messaging.outgoing.customer-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.customer-events.lazy-client=true
mp.messaging.outgoing.bom-events.connector=smallrye-kafka
mp.messaging.outgoing.bom-events.topic=bom-events
mp.messaging.outgoing.bom-events.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.bom-events.lazy-client=true

# ===== Keycloak OIDC =====
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:drone-platform}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:business-api}
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:secret}
# Pod起動直後はKeycloakへのDNS解決が不安定なことがあるためリトライさせる
quarkus.oidc.connection-retry-count=20
quarkus.oidc.connection-delay=5S
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.public.paths=/q/*
quarkus.http.auth.permission.public.policy=permit

# ===== OpenMetadata REST Client =====
quarkus.rest-client.openmetadata.url=${OPENMETADATA_HOST:http://localhost:8585}
quarkus.rest-client.openmetadata.connect-timeout=5000
quarkus.rest-client.openmetadata.read-timeout=10000
openmetadata.jwt-token=${OPENMETADATA_JWT_TOKEN:}

# ===== OpenShift =====
quarkus.kubernetes.deployment-target=openshift
quarkus.openshift.replicas=${APP_REPLICAS:2}
quarkus.openshift.labels.app=business-api
quarkus.openshift.labels."app.kubernetes.io/part-of"=datamesh-ai-agent-platform
quarkus.openshift.route.expose=true
quarkus.openshift.route.tls.termination=edge

# ===== OpenTelemetry =====
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}

# ===== Dev profile =====
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/dronedb
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.oidc.enabled=false
%dev.quarkus.http.auth.permission.authenticated.policy=permit

# ===== Test profile =====
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.oidc.enabled=false
%test.quarkus.http.auth.permission.authenticated.policy=permit
%test.openmetadata.jwt-token=test-token
