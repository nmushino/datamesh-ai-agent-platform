apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: python-test
  namespace: ai-agent-cicd
spec:
  params:
    - name: source-dir
      type: string
      default: "."
    - name: python-version
      type: string
      default: "3.11"
  workspaces:
    - name: source
  steps:
    # NOTE: Tekton の各 step は同一 Pod 内でも別コンテナとして実行されるため、
    # あるステップで pip install したパッケージは別ステップには引き継がれない
    # (共有されるのは workspace ボリュームのみ)。そのため依存関係インストールと
    # テスト実行は同一ステップにまとめる。
    - name: install-and-test
      image: python:$(params.python-version)-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: PYTHONPATH
          value: "."
        # テスト用ダミー環境変数
        - name: OPENMETADATA_HOST
          value: "http://mock-openmetadata:8585"
        - name: OPENMETADATA_JWT_TOKEN
          value: "test-token"
        - name: BUSINESS_API_URL
          value: "http://mock-business-api:8080"
        - name: VLLM_BASE_URL
          value: "http://mock-vllm:8080/v1"
        - name: VLLM_MODEL
          value: "test-model"
        - name: AGENT_DB_URL
          value: "postgresql://test:test@localhost:5432/testdb"
      script: |
        #!/bin/bash
        set -e
        pip install --upgrade pip -q
        # NOTE: 依存関係はルートではなく agent/ と tools/ にそれぞれ分かれている
        pip install -r agent/requirements.txt -q
        pip install -r tools/requirements.txt -q
        pip install pytest pytest-cov pytest-mock -q
        python -m pytest tests/ \
          --cov=$(params.source-dir) \
          --cov-report=xml:coverage.xml \
          --cov-report=term-missing \
          -v \
          --tb=short

    - name: check-coverage
      image: python:$(params.python-version)-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        # NOTE: カバレッジが低くてもパイプラインは継続する (警告表示のみ、失敗させない)
        python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        coverage = float(root.attrib.get('line-rate', 0)) * 100
        print(f'Coverage: {coverage:.1f}%')
        if coverage < 70:
            print('WARNING: Coverage is below 70%, but continuing.')
        else:
            print('Coverage check passed.')
        "
