---
# GitHub push イベントからパイプラインパラメータを取り出す
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-binding
  namespace: ai-agent-platform
spec:
  params:
    - name: git-url
      value: $(body.repository.clone_url)
    - name: git-revision
      value: $(body.head_commit.id)
    - name: git-ref
      value: $(body.ref)
---
# AI Agent パイプライン起動テンプレート
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: ai-agent-pipeline-run-template
  namespace: ai-agent-platform
spec:
  params:
    - name: git-url
    - name: git-revision
    - name: git-ref
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: ai-agent-build-
        namespace: ai-agent-platform
      spec:
        pipelineRef:
          name: ai-agent-build-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: image-name
            value: quay.io/droneplatform/ai-agent-orchestrator
          - name: deploy-overlay
            value: "deployment/kustomize/overlays/dev"
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          - name: docker-credentials
            secret:
              secretName: quay-credentials
---
# Business API パイプライン起動テンプレート
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: business-api-pipeline-run-template
  namespace: ai-agent-platform
spec:
  params:
    - name: git-url
    - name: git-revision
    - name: git-ref
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: business-api-build-
        namespace: ai-agent-platform
      spec:
        pipelineRef:
          name: business-api-build-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: image-name
            value: quay.io/droneplatform/business-api
          - name: deploy-overlay
            value: "deployment/kustomize/overlays/dev"
        workspaces:
          - name: shared-workspace
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
          - name: maven-cache
            persistentVolumeClaim:
              claimName: maven-cache-pvc
          - name: docker-credentials
            secret:
              secretName: quay-credentials
