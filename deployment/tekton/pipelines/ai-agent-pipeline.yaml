apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ai-agent-build-pipeline
  namespace: ai-agent-cicd
  annotations:
    tekton.dev/cicd: "true"
    tekton.dev/displayName: "AI Agent ビルド・テスト・デプロイ パイプライン"
spec:
  params:
    - name: git-url
      type: string
      description: Git リポジトリ URL
    - name: git-revision
      type: string
      default: main
      description: Git ブランチ / タグ / コミットハッシュ
    - name: image-name
      type: string
      default: image-registry.openshift-image-registry.svc:5000/ai-agent-platform/ai-agent-orchestrator
      description: ビルドするイメージ名 (overlays/dev の image remap と一致させる内部レジストリ)
    - name: deploy-overlay
      type: string
      default: deployment/kustomize/overlays/dev
      description: デプロイ先 overlay パス
    - name: enable-gitops-commit
      type: string
      default: "false"
      description: "true の場合のみ GitOps リポジトリへコミット・プッシュする (git-credentials Secret が必要)"
  workspaces:
    - name: shared-workspace
      description: パイプライン全体で共有するワークスペース
    - name: docker-credentials
      description: コンテナレジストリ認証情報
  results:
    - name: image-digest
      description: ビルドされたイメージのダイジェスト
      value: $(tasks.build-image.results.IMAGE_DIGEST)
    - name: image-url
      description: ビルドされたイメージの URL
      value: $(tasks.build-image.results.IMAGE_URL)
  tasks:
    # ① ソースコードを取得
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      # NOTE: このクラスターの openshift-pipelines/git-clone Task は
      # tekton catalog 版と異なり大文字のパラメータ名を使う。
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    # ② 静的解析 (lint)
    - name: lint
      runAfter:
        - git-clone
      taskRef:
        name: python-lint
        kind: Task
      params:
        - name: source-dir
          value: "."
      workspaces:
        - name: source
          workspace: shared-workspace

    # ③ 単体テスト
    - name: unit-test
      runAfter:
        - lint
      taskRef:
        name: python-test
        kind: Task
      params:
        - name: source-dir
          value: "."
      workspaces:
        - name: source
          workspace: shared-workspace

    # ④ コンテナイメージをビルド & プッシュ
    - name: build-image
      runAfter:
        - unit-test
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-name):$(tasks.git-clone.results.COMMIT)
        - name: DOCKERFILE
          value: agent/orchestrator/Dockerfile
        - name: CONTEXT
          value: .
        - name: FORMAT
          value: oci
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: dockerconfig
          workspace: docker-credentials

    # ⑤ イメージスキャン (Trivy)
    - name: image-scan
      runAfter:
        - build-image
      taskRef:
        name: trivy-scanner
        kind: Task
      params:
        - name: IMAGE
          value: $(params.image-name):$(tasks.git-clone.results.COMMIT)
        - name: SEVERITY
          value: "CRITICAL,HIGH"
      workspaces:
        - name: source
          workspace: shared-workspace

    # ⑥ Kustomize の image タグを更新して GitOps でデプロイ (任意)
    - name: update-gitops
      runAfter:
        - image-scan
      when:
        - input: $(params.enable-gitops-commit)
          operator: in
          values: ["true"]
      taskRef:
        name: update-kustomize-image
        kind: Task
      params:
        - name: image-name
          value: $(params.image-name)
        - name: new-tag
          value: $(tasks.git-clone.results.COMMIT)
        - name: overlay-path
          value: $(params.deploy-overlay)
      workspaces:
        - name: source
          workspace: shared-workspace

  # パイプライン失敗時の通知 (チャット通知ではなく共有Kafkaのpipeline-notificationsトピックに保持する)
  finally:
    - name: notify-on-failure
      when:
        - input: $(tasks.unit-test.status)
          operator: in
          values: ["Failed"]
      taskRef:
        name: send-kafka-notification
        kind: Task
      params:
        - name: message
          value: "AI Agent パイプラインが失敗しました: $(params.git-url) @ $(params.git-revision)"
        - name: pipeline-name
          value: "ai-agent-build-pipeline"
        - name: status
          value: "Failed"
