apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: business-api-build-pipeline
  namespace: ai-agent-cicd
  annotations:
    tekton.dev/cicd: "true"
    tekton.dev/displayName: "Business API (Quarkus) ビルド・テスト・デプロイ パイプライン"
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: main
    - name: image-name
      type: string
      # 内部レジストリ (overlays/dev の image remap と一致させる)
      default: image-registry.openshift-image-registry.svc:5000/ai-agent-platform/business-api
    - name: deploy-overlay
      type: string
      default: deployment/kustomize/overlays/dev
    - name: native-build
      type: string
      default: "false"
      description: "true にすると GraalVM Native ビルドを行う（時間がかかる）"
    - name: enable-gitops-commit
      type: string
      default: "false"
      description: "true の場合のみ GitOps リポジトリへコミット・プッシュする (git-credentials Secret が必要)"
  workspaces:
    - name: shared-workspace
    # NOTE: maven-cache (静的PVC) は shared-workspace (volumeClaimTemplate) と
    # 同一 TaskRun 内で併用すると Tekton の affinity assistant が
    # "more than one PersistentVolumeClaim is bound" で TaskRun を拒否するため削除。
    - name: docker-credentials
  results:
    - name: image-digest
      value: $(tasks.build-image.results.IMAGE_DIGEST)
  tasks:
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      # NOTE: このクラスターの openshift-pipelines/git-clone Task は
      # tekton catalog 版と異なり大文字のパラメータ名を使う。
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace

    # Maven テスト
    - name: maven-test
      runAfter:
        - git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      params:
        - name: GOALS
          value:
            - -f
            - backend/business-api/pom.xml
            - test
            - -Dquarkus.profile=test
        - name: MAVEN_MIRROR_URL
          value: ""
      workspaces:
        - name: source
          workspace: shared-workspace

    # Quarkus ビルド (JVM モード)
    # NOTE: Tekton の変数展開は三項演算子等の式をサポートしないため
    # ("$(params.x == 'a' ? 'b' : 'c')" は無効)、native-build の値で
    # when 条件分岐する2つの Task に分割している。
    - name: maven-package-jvm
      runAfter:
        - maven-test
      when:
        - input: $(params.native-build)
          operator: notin
          values: ["true"]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      params:
        - name: GOALS
          value:
            - -f
            - backend/business-api/pom.xml
            - package
            - -DskipTests
            # NOTE: Dockerfile.jvm は Quarkus のデフォルト fast-jar レイアウト
            # (target/quarkus-app/lib 等) を前提にしている。uber-jar にすると
            # そのディレクトリ構成が生成されずイメージビルドが失敗する。
      workspaces:
        - name: source
          workspace: shared-workspace

    # Quarkus ビルド (GraalVM Native モード)
    - name: maven-package-native
      runAfter:
        - maven-test
      when:
        - input: $(params.native-build)
          operator: in
          values: ["true"]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      params:
        - name: GOALS
          value:
            - -f
            - backend/business-api/pom.xml
            - package
            - -DskipTests
            - "-Dquarkus.package.type=native"
      workspaces:
        - name: source
          workspace: shared-workspace

    # コンテナイメージビルド
    - name: build-image
      runAfter:
        - maven-package-jvm
        - maven-package-native
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-name):$(tasks.git-clone.results.COMMIT)
        - name: DOCKERFILE
          value: backend/business-api/src/main/docker/Dockerfile.jvm
        - name: CONTEXT
          value: backend/business-api
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: dockerconfig
          workspace: docker-credentials

    # :dev タグ付け。overlays/dev の Deployment は :dev を静的参照しているが
    # build-image は commit SHA タグしか push しない (enable-gitops-commit は
    # デフォルト無効) ため、そのままでは ImagePullBackOff (manifest unknown) に
    # なる (2026-07-22 sandbox39 で発生・原因調査済み)。pipeline SA は
    # ImageStream の tag 操作権限を持つため oc tag で解決する。
    - name: tag-dev
      runAfter:
        - build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            oc tag ai-agent-platform/business-api:$(tasks.git-clone.results.COMMIT) \
              ai-agent-platform/business-api:dev

    # GitOps 更新 (任意)
    - name: update-gitops
      runAfter:
        - build-image
      when:
        - input: $(params.enable-gitops-commit)
          operator: in
          values: ["true"]
      taskRef:
        name: update-kustomize-image
        kind: Task
      params:
        - name: image-name
          value: $(params.image-name)
        - name: new-tag
          value: $(tasks.git-clone.results.COMMIT)
        - name: overlay-path
          value: $(params.deploy-overlay)
      workspaces:
        - name: source
          workspace: shared-workspace
