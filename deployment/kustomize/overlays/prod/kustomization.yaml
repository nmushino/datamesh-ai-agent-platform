apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-agent-platform-prod

bases:
  - ../../base

patches:
  # AI Agent: レプリカ増強・リソース増強
  - target:
      kind: Deployment
      name: ai-agent-orchestrator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
  # Business API: レプリカ増強
  - target:
      kind: Deployment
      name: business-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
  # HPA 追加
  - target:
      kind: Deployment
      name: ai-agent-orchestrator
    patch: |-
      - op: add
        path: /metadata/annotations/autoscaling.alpha.kubernetes.io~1conditions
        value: "[]"

images:
  - name: quay.io/droneplatform/ai-agent-orchestrator
    newTag: "1.0.0"
  - name: quay.io/droneplatform/business-api
    newTag: "1.0.0"

labels:
  - pairs:
      environment: prod
    includeSelectors: false

# 本番: HPA を追加
resources:
  - hpa.yaml
