apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-agent-platform

bases:
  - ../../base

# 開発環境: レプリカ数を最小に
patches:
  - target:
      kind: Deployment
      name: ai-agent-orchestrator
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: business-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

# イメージ: 内部レジストリのdevビルドを使用
images:
  - name: quay.io/droneplatform/ai-agent-orchestrator
    newName: image-registry.openshift-image-registry.svc:5000/ai-agent-platform/ai-agent-orchestrator
    newTag: "dev"
  - name: quay.io/droneplatform/business-api
    newName: image-registry.openshift-image-registry.svc:5000/ai-agent-platform/business-api
    newTag: "dev"
  - name: quay.io/droneplatform/chat-ui
    newName: image-registry.openshift-image-registry.svc:5000/ai-agent-platform/chat-ui
    newTag: "dev"

labels:
  - pairs:
      environment: dev
    includeSelectors: false
