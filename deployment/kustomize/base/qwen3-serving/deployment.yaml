# OpenShift AI (RHOAI) + KServe(RawDeployment) + vLLM CPU で Qwen3-8B を提供する
# GPUなし単一ノードのsandbox向け (量子化はCUDA前提のため未使用、bfloat16のままCPU推論)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen3-8b-model-pvc
  namespace: ai-agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 8Bはbfloat16で約16GiB。モデル本体+作業領域の余裕を見て40Giに拡張
      storage: 40Gi
---
# 初回のみ HuggingFace Hub からモデルを取得して永続化する
# (InferenceServiceのstorageUriをhf://にすると、EmptyDirのephemeral-storage枯渇で
#  Evictされるため、事前にPVCへダウンロードしてpvc://で参照する)
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen3-8b-model-download
  namespace: ai-agent-platform
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: registry.redhat.io/rhoai/odh-kserve-storage-initializer-rhel9@sha256:83bebb2ea3ef6285355a45c56af393d3cec4cb9802717c436515f283bf806845
          args:
            - "hf://Qwen/Qwen3-8B"
            - "/mnt/models"
          env:
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
          resources:
            requests:
              cpu: "500m"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - mountPath: /mnt/models
              name: model-storage
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: qwen3-8b-model-pvc
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/runtime-version: v0.18.0
    openshift.io/display-name: vLLM CPU (x86) ServingRuntime for KServe
  labels:
    opendatahub.io/dashboard: "true"
  name: vllm-cpu-x86-runtime
  namespace: ai-agent-platform
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
        - --dtype=bfloat16
        # ツール定義込みのシステムプロンプト(実測約2000トークン)+出力上限を
        # 余裕を持って収める必要があるため4096から引き上げる
        - --max-model-len=8192
        # tool-calling (create_react_agentのtool_choice=auto) を使うために必要
        - --enable-auto-tool-choice
        - --tool-call-parser=hermes
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        # 8Bはトークンあたりのhidden sizeが4Bの約2倍のためKVキャッシュ容量も増やす
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "6"
      image: registry.redhat.io/rhaii/vllm-cpu-rhel9@sha256:0ec0f5ff9a5ff263f58db0cfb19e3d7eef24b94c2d8629fe5145f5a8747e28c9
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        # 8Bはbfloat16で重み約16GiB。4B時(12/16Gi)から拡張
        requests:
          cpu: "4"
          memory: 24Gi
        limits:
          cpu: "8"
          memory: 32Gi
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-8b
  namespace: ai-agent-platform
  annotations:
    # このRHOAIバージョンはRawDeploymentのみサポート(Serverless/ServiceMesh不要)
    serving.kserve.io/deploymentMode: RawDeployment
spec:
  predictor:
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-cpu-x86-runtime
      storageUri: "pvc://qwen3-8b-model-pvc/"
      resources:
        requests:
          cpu: "4"
          memory: 24Gi
        limits:
          cpu: "8"
          memory: 32Gi
    minReplicas: 1
    maxReplicas: 1
