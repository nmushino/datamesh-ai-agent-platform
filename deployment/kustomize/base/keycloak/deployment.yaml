apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: ai-agent-platform
  labels:
    app: sso
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgresql
    database: keycloak_db
    usernameSecret:
      name: postgresql-secret
      key: username
    passwordSecret:
      name: postgresql-secret
      key: password
  http:
    httpEnabled: true
  hostname:
    strict: false
  ingress:
    enabled: false
  proxy:
    headers: xforwarded
---
# chat-ui (ブラウザSPA) がログイン画面にリダイレクトするための外部公開Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: ai-agent-platform
spec:
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: keycloak-service
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: drone-platform
  namespace: ai-agent-platform
spec:
  keycloakCRName: keycloak
  realm:
    id: drone-platform
    realm: drone-platform
    enabled: true
    clients:
      - clientId: business-api
        secret: dev-client-secret
        enabled: true
        standardFlowEnabled: true
        serviceAccountsEnabled: true
        directAccessGrantsEnabled: true
        redirectUris:
          - "*"
      # chat-ui SPA用のパブリッククライアント (Authorization Code + PKCE)
      - clientId: chat-ui
        publicClient: true
        enabled: true
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - "*"
        webOrigins:
          - "*"
        attributes:
          "pkce.code.challenge.method": "S256"
    users:
      # 動作確認用の開発ユーザー
      - username: devuser
        enabled: true
        email: devuser@example.com
        credentials:
          - type: password
            value: devpass123
            temporary: false
