apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: ai-agent-platform
  labels:
    app: sso
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgresql
    database: keycloak_db
    usernameSecret:
      name: postgresql-secret
      key: username
    passwordSecret:
      name: postgresql-secret
      key: password
  http:
    httpEnabled: true
  hostname:
    strict: false
  ingress:
    enabled: false
  proxy:
    headers: xforwarded
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: drone-platform
  namespace: ai-agent-platform
spec:
  keycloakCRName: keycloak
  realm:
    id: drone-platform
    realm: drone-platform
    enabled: true
    clients:
      - clientId: business-api
        secret: dev-client-secret
        enabled: true
        standardFlowEnabled: true
        serviceAccountsEnabled: true
        directAccessGrantsEnabled: true
        redirectUris:
          - "*"
