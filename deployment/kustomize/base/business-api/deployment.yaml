apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-api
  namespace: ai-agent-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: business-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: business-api
    spec:
      serviceAccountName: business-api-sa
      containers:
        - name: business-api
          image: quay.io/droneplatform/business-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: business-api-config
                  key: db-host
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: business-api-config
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: business-api-config
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: business-api-config
                  key: kafka-bootstrap-servers
            - name: OPENMETADATA_HOST
              valueFrom:
                configMapKeyRef:
                  name: business-api-config
                  key: openmetadata-host
            - name: OPENMETADATA_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-secret
                  key: jwt-token
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: business-api-config
                  key: keycloak-url
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: business-api-config
                  key: keycloak-realm
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: client-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            # OIDC接続リトライ(最大20回x5秒)がKeycloak起動完了を待つためHTTPサーバー起動が遅れる場合がある
            initialDelaySeconds: 150
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: business-api-config
  namespace: ai-agent-platform
data:
  db-host: "postgresql"
  db-name: "dronedb"
  db-username: "postgres"
  # OpenMetadata / Kafka は openmetadata / quarkusdroneshop-demo namespace の既存インスタンスを共用する
  kafka-bootstrap-servers: "kafka-cluster-kafka-bootstrap.quarkusdroneshop-demo.svc.cluster.local:9092"
  openmetadata-host: "http://openmetadata.openmetadata.svc.cluster.local:8585"
  keycloak-url: "http://keycloak-service:8080"
  keycloak-realm: "drone-platform"
