---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: ai-agent-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: chat-ui
        - podSelector:
            matchLabels:
              app: rhdh-backend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8000
  egress:
    # OpenMetadata は openmetadata namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openmetadata
      ports:
        - port: 8585
    - to:
        - podSelector:
            matchLabels:
              app: business-api
      ports:
        - port: 8080
    # OpenShift AI (RHOAI) + KServe InferenceService (vLLM, Qwen3-8B)
    # NOTE: podSelector 単独では同一 namespace 内の Pod にしかマッチしないため、
    # 別 namespace (ai-model-serving) で動く vLLM Pod への egress には
    # namespaceSelector の併記が必須。
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-model-serving
          podSelector:
            matchLabels:
              serving.kserve.io/inferenceservice: qwen3-8b
      ports:
        - port: 8080
    # Ollama (フォールバック用、要否は要検討)
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - port: 11434
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # pipeline-notifications トピック購読 (chat-ui通知バッジ用)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-demo
      ports:
        - port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: business-api-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: business-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ai-agent-orchestrator
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # Kafka は quarkusdroneshop-demo namespace の共有クラスタを利用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-demo
      ports:
        - port: 9092
    # OpenMetadata は openmetadata namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openmetadata
      ports:
        - port: 8585
    # Keycloak は keycloak namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 8080
        - port: 8443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
