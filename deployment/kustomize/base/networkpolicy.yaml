---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: ai-agent-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: chat-ui
        - podSelector:
            matchLabels:
              app: rhdh-backend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8000
  egress:
    # OpenMetadata は openmetadata namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openmetadata
      ports:
        - port: 8585
    - to:
        - podSelector:
            matchLabels:
              app: business-api
      ports:
        - port: 8080
    # OpenShift AI (RHOAI) + KServe InferenceService (vLLM, Qwen3-8B)
    # NOTE: podSelector 単独では同一 namespace 内の Pod にしかマッチしないため、
    # 別 namespace (ai-model-serving) で動く vLLM Pod への egress には
    # namespaceSelector の併記が必須。
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-model-serving
          podSelector:
            matchLabels:
              serving.kserve.io/inferenceservice: qwen3-8b
      ports:
        - port: 8080
    # Ollama (フォールバック用、要否は要検討)
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - port: 11434
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # pipeline-notifications トピック購読 (chat-ui通知バッジ用)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-demo
      ports:
        - port: 9092
    # Skupper 経由の A/B/C サイト Kafka リスナー (quarkusdroneshop-rhdh namespace)。
    # 実クラスタには元々このルールが存在していたが git 側に反映されていなかった
    # ため追加(ライブとgitの差分を解消)。
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-rhdh
    # NOTE: Kafka の AdminClient/Producer/Consumer は bootstrap 接続後、各リクエストを
    # 個別ブローカーの advertised.listeners 先へ直接接続する。A/B/C サイトの external
    # リスナーは advertised host に AWS ELB の公開ホスト名を使っているため、
    # Skupper (quarkusdroneshop-rhdh namespace) への egress だけでは
    # listTopics/createTopics/produce が "waiting for a node assignment" 等で
    # タイムアウトする。ELB の IP は再割り当てされることがある(過去に実際に
    # 発生し Skupper リンク断の原因になった)ため、この許可リストは ELB の
    # IP が変わった際に更新が必要になる点に注意。
    - to:
        - ipBlock:
            cidr: 13.59.244.2/32   # external-shop-cluster-kafka-asite advertised ELB
        - ipBlock:
            cidr: 3.136.53.135/32  # external-shop-cluster-kafka-bsite advertised ELB
        - ipBlock:
            cidr: 18.188.138.218/32 # external-shop-cluster-kafka-csite advertised ELB
      ports:
        - port: 9094
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: business-api-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: business-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ai-agent-orchestrator
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # Kafka は quarkusdroneshop-demo namespace の共有クラスタを利用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-demo
      ports:
        - port: 9092
    # OpenMetadata は openmetadata namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openmetadata
      ports:
        - port: 8585
    # Keycloak は keycloak namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 8080
        - port: 8443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
