---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: ai-agent-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: chat-ui
        - podSelector:
            matchLabels:
              app: rhdh-backend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8000
  egress:
    # OpenMetadata は openmetadata namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openmetadata
      ports:
        - port: 8585
    - to:
        - podSelector:
            matchLabels:
              app: business-api
      ports:
        - port: 8080
    # OpenShift AI (RHOAI) + KServe InferenceService (vLLM, Qwen3-8B)
    # NOTE: podSelector 単独では同一 namespace 内の Pod にしかマッチしないため、
    # 別 namespace (ai-model-serving) で動く vLLM Pod への egress には
    # namespaceSelector の併記が必須。
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai-model-serving
          podSelector:
            matchLabels:
              serving.kserve.io/inferenceservice: qwen3-8b
      ports:
        - port: 8080
    # Ollama (フォールバック用、要否は要検討)
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - port: 11434
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # pipeline-notifications トピック購読 (chat-ui通知バッジ用)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-demo
      ports:
        - port: 9092
    # Skupper 経由の A/B/C サイト Kafka リスナー (quarkusdroneshop-rhdh namespace)。
    # 実クラスタには元々このルールが存在していたが git 側に反映されていなかった
    # ため追加(ライブとgitの差分を解消)。
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-rhdh
    # NOTE: Kafka の AdminClient/Producer/Consumer は bootstrap 接続後、各リクエストを
    # 個別ブローカーの advertised.listeners 先へ直接接続する。A/B/C サイトの external
    # リスナーは advertised host に AWS ELB (マルチAZ、AZごとに1 IPで計2 IP/サイト)
    # の公開ホスト名を使っているため、Skupper (quarkusdroneshop-rhdh namespace) への
    # egress だけでは listTopics/createTopics/produce/delete が
    # "waiting for a node assignment" 等でタイムアウトする。ELB の IP は再割り当て
    # されることがある(過去に実際に発生し Skupper リンク断の原因になった)ため、
    # この許可リストは ELB の IP が変わった際に更新が必要になる点に注意。
    - to:
        - ipBlock:
            cidr: 18.119.154.139/32  # external-shop-cluster-kafka-asite advertised ELB (bootstrap AZ1、sandbox780)
        - ipBlock:
            cidr: 3.131.194.78/32  # external-shop-cluster-kafka-asite advertised ELB (bootstrap AZ2、sandbox780)
        - ipBlock:
            cidr: 18.189.234.206/32  # external-shop-cluster-kafka-asite advertised ELB (broker0 AZ1、sandbox780)
        - ipBlock:
            cidr: 3.13.187.72/32  # external-shop-cluster-kafka-asite advertised ELB (broker0 AZ2、sandbox780)
        - ipBlock:
            cidr: 18.116.108.240/32  # external-shop-cluster-kafka-asite advertised ELB (broker1 AZ1、sandbox780)
        - ipBlock:
            cidr: 18.117.205.137/32  # external-shop-cluster-kafka-asite advertised ELB (broker1 AZ2、sandbox780)
        - ipBlock:
            cidr: 18.116.78.10/32  # external-shop-cluster-kafka-asite advertised ELB (broker2 AZ1、sandbox780)
        - ipBlock:
            cidr: 3.130.41.83/32  # external-shop-cluster-kafka-asite advertised ELB (broker2 AZ2、sandbox780)
        # asite ELB が IP を再割り当て (2026-07-22 確認、listTopics/createTopics が
        # "Timed out waiting for a node assignment" で失敗する原因だった)。
        # 上の8個の旧IPは残置し、新IPを追加する形で復旧。
        - ipBlock:
            cidr: 18.224.111.6/32  # external-shop-cluster-kafka-asite advertised ELB (再割り当て後、sandbox780)
        - ipBlock:
            cidr: 3.131.50.88/32  # external-shop-cluster-kafka-asite advertised ELB (再割り当て後、sandbox780)
        - ipBlock:
            cidr: 3.136.53.135/32   # external-shop-cluster-kafka-bsite advertised ELB (AZ1)
        - ipBlock:
            cidr: 18.117.213.10/32  # external-shop-cluster-kafka-bsite advertised ELB (AZ2)
        - ipBlock:
            cidr: 13.59.243.104/32  # external-shop-cluster-kafka-csite advertised ELB (bootstrap AZ1、sandbox850)
        - ipBlock:
            cidr: 3.141.248.102/32  # external-shop-cluster-kafka-csite advertised ELB (bootstrap AZ2、sandbox850)
        - ipBlock:
            cidr: 13.59.7.106/32  # external-shop-cluster-kafka-csite advertised ELB (broker0 AZ1、sandbox850)
        - ipBlock:
            cidr: 3.136.74.195/32  # external-shop-cluster-kafka-csite advertised ELB (broker0 AZ2、sandbox850)
        - ipBlock:
            cidr: 18.116.139.253/32  # external-shop-cluster-kafka-csite advertised ELB (broker1 AZ1、sandbox850)
        - ipBlock:
            cidr: 3.12.67.142/32  # external-shop-cluster-kafka-csite advertised ELB (broker1 AZ2、sandbox850)
        - ipBlock:
            cidr: 18.117.60.108/32  # external-shop-cluster-kafka-csite advertised ELB (broker2 AZ1、sandbox850)
        - ipBlock:
            cidr: 3.13.234.199/32  # external-shop-cluster-kafka-csite advertised ELB (broker2 AZ2、sandbox850)
        # csite は A/B サイトと異なり bootstrap と各ブローカーが別々の ELB (broker
        # ごとに個別 LoadBalancer Service) になっているため、bootstrap 接続後の
        # 個別ブローカーへの直接接続用に broker 0/1/2 の advertised ELB も追加。
      ports:
        - port: 9094
    # A/B/C サイト自身の Kubernetes API サーバーへの egress。delete_kafka_topic が
    # 削除前後に各サイトの MirrorMaker2 (KafkaMirrorMaker2 リソース) を
    # 一時停止/再開するために必要(スコープを絞った ServiceAccount トークン
    # 経由、*-mm2-pause-token Secret 参照)。Kafka wire protocol (Skupper 経由)
    # とは別に、Kubernetes API 自体への到達性が新たに必要になった。
    # NOTE: 各APIサーバーのホスト名はDNSラウンドロビンで複数IPを返す
    # (実際に1つだけ許可した状態で約1/3のリクエストがブロックされ、broker-2への
    # execだけがランダムに403/タイムアウトするという再現しにくい障害が発生した)。
    # そのため解決された全IPを許可リストに含める必要がある。IPはサイトの
    # クラスターが再プロビジョニングされる度に変わりうる点にも注意。
    - to:
        - ipBlock:
            cidr: 3.151.177.141/32   # A-site API server (api.ocp.zgjl6.sandbox780.opentlc.com)
        - ipBlock:
            cidr: 18.225.243.210/32  # A-site API server (2つ目のDNS解決先)
        - ipBlock:
            cidr: 52.14.32.164/32    # A-site API server (3つ目のDNS解決先)
        - ipBlock:
            cidr: 18.217.43.147/32   # B-site API server (api.ocp.659hh.sandbox2372.opentlc.com)
        - ipBlock:
            cidr: 16.58.236.83/32    # B-site API server (2つ目のDNS解決先)
        - ipBlock:
            cidr: 18.223.39.51/32    # B-site API server (3つ目のDNS解決先)
        - ipBlock:
            cidr: 18.226.224.118/32  # C-site API server (api.ocp.44gnd.sandbox850.opentlc.com、csite再構築後)
        - ipBlock:
            cidr: 18.119.181.89/32   # C-site API server (2つ目のDNS解決先)
        - ipBlock:
            cidr: 3.128.135.120/32   # C-site API server (3つ目のDNS解決先)
      ports:
        - port: 6443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    # GitHub API (api.github.com) への egress。schema_agent の list_github_org_repos /
    # find_github_files_by_name / get_github_readme / get_github_file_content が
    # このルール無しでは常に ConnectTimeout になっていた(DNS解決は成功するが
    # TCP接続自体がNetworkPolicyでブロックされていたため)。GitHubのIPは頻繁に
    # 変わり固定IPの列挙が非現実的なため、他のルールのような ipBlock の狭い
    # 許可リストではなく、外部HTTPS(443番)全体を許可する。
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: business-api-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: business-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ai-agent-orchestrator
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # Kafka は quarkusdroneshop-demo namespace の共有クラスタを利用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: quarkusdroneshop-demo
      ports:
        - port: 9092
    # OpenMetadata は openmetadata namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openmetadata
      ports:
        - port: 8585
    # Keycloak は keycloak namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
      ports:
        - port: 8080
        - port: 8443
    # business-api の OIDC auth-server-url は iss claim を外部Route URLと一致させる
    # 必要があるため、keycloak namespace 内部への直接アクセスではなく外部Route
    # (sso.apps.ocp.*、reencrypt) 経由で接続する。
    # NOTE: namespaceSelector: openshift-ingress によるルールは効かなかった
    # (デフォルトRouterは hostNetwork: true で動作しており、その場合 Pod IP が
    # ノードのIP=このOpenTLCサンドボックスではパブリックIPになるため、OVN-Kubernetes
    # の NetworkPolicy が hostNetwork Pod のトラフィックを openshift-ingress
    # namespace 所属として正しく評価できていない模様)。Kafka ELB や APIサーバーの
    # 許可リストと同様、Route の名前解決結果を ipBlock で直接許可する形にした。
    # sso.apps.ocp.7n8gs.sandbox847.opentlc.com の IP が変わった場合は要更新。
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
        - ipBlock:
            cidr: 13.58.29.199/32   # sso.apps.ocp.7n8gs.sandbox847.opentlc.com (Keycloak Route、1つ目のDNS解決先)
        - ipBlock:
            cidr: 3.131.54.214/32   # sso.apps.ocp.7n8gs.sandbox847.opentlc.com (Keycloak Route、2つ目のDNS解決先)
      ports:
        - port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-server-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # MCP Gateway (Red Hat Connectivity Link) の Envoy データプレーンは
    # connectivitylink namespace で稼働し、HTTPRoute のクロス namespace backendRef
    # (ReferenceGrant 経由) 経由でここへ到達する。
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: connectivitylink
      ports:
        - port: 8000
  egress:
    # OpenMetadata は openmetadata namespace の既存インスタンスを共用する
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openmetadata
      ports:
        - port: 8585
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
