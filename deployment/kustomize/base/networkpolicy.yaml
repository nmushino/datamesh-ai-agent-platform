---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: ai-agent-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: chat-ui
        - podSelector:
            matchLabels:
              app: rhdh-backend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: openmetadata
      ports:
        - port: 8585
    - to:
        - podSelector:
            matchLabels:
              app: business-api
      ports:
        - port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redhat-ods-applications
      ports:
        - port: 80
        - port: 8080
        - port: 443
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: business-api-policy
  namespace: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app: business-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ai-agent-orchestrator
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              strimzi.io/name: kafka-cluster-kafka
      ports:
        - port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: openmetadata
      ports:
        - port: 8585
    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        # dns-default Service は 53 だが CoreDNS 実体は 5353 で待ち受けている
        # (NetworkPolicy は DNAT 後の実ポートで評価されるため両方許可する)
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
