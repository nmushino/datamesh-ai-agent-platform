# OpenShift AI (RHOAI/vLLM) が未導入のsandbox環境向けの軽量LLM推論代替
# GPUなし単一ノードでも動く小型モデルをCPU推論する
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: ai-agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: docker.io/ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: HOME
              value: /home/ollama
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          volumeMounts:
            - name: data
              mountPath: /home/ollama/.ollama
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "6Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-agent-platform
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
# 初回のみ小型モデルを取得する
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-model
  namespace: ai-agent-platform
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: docker.io/ollama/ollama:latest
          env:
            - name: HOME
              value: /tmp
            - name: OLLAMA_HOST
              value: "ollama:11434"
          command:
            - /bin/sh
            - -c
            - |
              until ollama list >/dev/null 2>&1; do
                echo "waiting for ollama server..."; sleep 5
              done
              ollama pull granite3-dense:2b
