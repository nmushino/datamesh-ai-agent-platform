apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-orchestrator
  namespace: ai-agent-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agent-orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ai-agent-orchestrator
    spec:
      serviceAccountName: ai-agent-sa
      containers:
        - name: orchestrator
          image: quay.io/droneplatform/ai-agent-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # NOTE: vLLM の URL/モデル名は ai-agent-vllm-config を使うこと
            # (aiagent.sh の deploy() が InferenceService の実際のアドレスから
            # 動的に生成する)。ai-agent-config 側の同名キーはポート番号を
            # 含まない誤った固定値のプレースホルダーであり、接続できない。
            - name: VLLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-vllm-config
                  key: vllm-base-url
            - name: VLLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-vllm-config
                  key: vllm-model-name
            - name: OPENMETADATA_HOST
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-config
                  key: openmetadata-host
            - name: BUSINESS_API_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-config
                  key: business-api-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-config
                  key: kafka-bootstrap-servers
            - name: SCHEDULED_TASK_TABLES
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-config
                  key: scheduled-task-tables
            - name: SCHEDULED_TASK_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: ai-agent-config
                  key: scheduled-task-interval-seconds
            - name: OPENMETADATA_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-secret
                  key: jwt-token
            - name: AGENT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: agent-db-secret
                  key: url
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            # DB接続リトライ(最大30回x5秒)がlifespan startup内でHTTPサーバー起動をブロックするため
            # その最大待機時間より長い猶予を確保する
            initialDelaySeconds: 180
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-agent-config
  namespace: ai-agent-platform
data:
  # NOTE: vLLM の URL/モデル名は ai-agent-vllm-config (aiagent.sh の deploy() が
  # InferenceService の実アドレスから動的生成) を使うため、ここには置かない。
  # OpenMetadata / Kafka は openmetadata / quarkusdroneshop-demo namespace の既存インスタンスを共用する
  openmetadata-host: "http://openmetadata.openmetadata.svc.cluster.local:8585"
  business-api-url: "http://business-api:8080"
  kafka-bootstrap-servers: "kafka-cluster-kafka-bootstrap.quarkusdroneshop-demo.svc.cluster.local:9092"
  # Agentによる定期チェック対象テーブル(カンマ区切りの完全修飾名)。空の場合は定期チェックを無効化する
  scheduled-task-tables: ""
  scheduled-task-interval-seconds: "300"
