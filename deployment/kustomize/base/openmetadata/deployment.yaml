apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmetadata
  namespace: ai-agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openmetadata
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openmetadata
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgresql 5432; do sleep 2; done']
      containers:
        - name: openmetadata
          image: docker.getcollate.io/openmetadata/server:1.3.0
          ports:
            - containerPort: 8585
          env:
            - name: OPENMETADATA_CLUSTER_NAME
              value: "enterprise-ai-agent"
            - name: DB_DRIVER_CLASS
              value: "org.postgresql.Driver"
            - name: DB_SCHEME
              value: "postgresql"
            - name: DB_HOST
              value: "postgresql"
            - name: DB_PORT
              value: "5432"
            - name: OM_DATABASE
              value: "openmetadata_db"
            - name: DB_USER
              value: "postgres"
            - name: DB_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
            - name: AIRFLOW_HOST
              value: "http://airflow:8080"
            - name: SERVER_HOST_API_URL
              value: "http://openmetadata:8585/api"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/system/status
              port: 8585
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v1/system/status
              port: 8585
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: openmetadata
  namespace: ai-agent-platform
spec:
  selector:
    app: openmetadata
  ports:
    - name: http
      port: 8585
      targetPort: 8585
