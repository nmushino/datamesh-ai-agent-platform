apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# OpenMetadata は openmetadata namespace、Kafka は quarkusdroneshop-demo namespace、
# Keycloak は keycloak namespace の既存インスタンスを共用するため、
# このplatform専用のリソースは持たない (Kafkaは deployment/kustomize/kafka-shared/ を参照)
#
# NOTE: ollama/deployment.yaml と qwen3-serving/deployment.yaml は GPU/RHOAI が
# 使えない sandbox 環境向けの CPU 推論フォールバックのため、意図的に含めていない。
# GPU (RHOAI vLLM) が使える環境では aiagent.sh vllm で ai-model-serving namespace に
# デプロイした InferenceService を使うこと。フォールバックが必要な場合は
# ollama/deployment.yaml または qwen3-serving/deployment.yaml を resources に追加する。
resources:
  - ai-agent/deployment.yaml
  - ai-agent/service.yaml
  - ai-agent/route.yaml
  - business-api/deployment.yaml
  - business-api/service.yaml
  - business-api/route.yaml
  - mcp-server/deployment.yaml
  - mcp-server/service.yaml
  - postgresql/deployment.yaml
  - chat-ui/deployment.yaml
  - namespace.yaml
  - rbac.yaml
  - networkpolicy.yaml

labels:
  - pairs:
      app.kubernetes.io/name: datamesh-ai-agent-platform
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

commonAnnotations:
  app.kubernetes.io/part-of: datamesh-ai-agent-platform
