apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# OpenMetadata は openmetadata namespace、Kafka は quarkusdroneshop-demo namespace の
# 既存インスタンスを共用するため、このplatform専用のリソースは持たない
# (Kafkaは deployment/kustomize/kafka-shared/ を参照)
resources:
  - ai-agent/deployment.yaml
  - ai-agent/service.yaml
  - ai-agent/route.yaml
  - business-api/deployment.yaml
  - business-api/service.yaml
  - business-api/route.yaml
  - postgresql/deployment.yaml
  - keycloak/deployment.yaml
  - ollama/deployment.yaml
  - qwen3-serving/deployment.yaml
  - namespace.yaml
  - rbac.yaml
  - networkpolicy.yaml

labels:
  - pairs:
      app.kubernetes.io/name: enterprise-ai-agent-platform
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

commonAnnotations:
  app.kubernetes.io/part-of: enterprise-ai-agent-platform
