apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-ui
  namespace: ai-agent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-ui
  template:
    metadata:
      labels:
        app: chat-ui
    spec:
      containers:
        - name: chat-ui
          image: quay.io/droneplatform/chat-ui:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            # ブラウザから直接アクセスするため各サービスの外部 Route URL を指定する
            # (deploy.sh が Route作成後に実際のホスト名で上書きする)
            - name: API_BASE_URL
              value: ""
            - name: KEYCLOAK_URL
              value: ""
            - name: KEYCLOAK_REALM
              value: "drone-platform"
            - name: KEYCLOAK_CLIENT_ID
              value: "chat-ui"
            - name: OPENMETADATA_URL
              value: ""
            - name: DEVELOPER_HUB_URL
              value: ""
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chat-ui
  namespace: ai-agent-platform
spec:
  selector:
    app: chat-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: chat-ui
  namespace: ai-agent-platform
spec:
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: chat-ui
