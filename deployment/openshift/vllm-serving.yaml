# vLLM ServingRuntime (OpenShift AI / RHOAI)
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  namespace: redhat-ods-applications
  labels:
    app: vllm-runtime
spec:
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: quay.io/rh-aiservices-bu/vllm-openai-ubi9:0.4.2
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - "--model=/mnt/models"
        - "--dtype=float16"
        - "--max-model-len=8192"
        - "--tensor-parallel-size=1"
        - "--served-model-name=$(MODEL_NAME)"
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: "32Gi"
          nvidia.com/gpu: "1"
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 120
        periodSeconds: 10
        failureThreshold: 10
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 180
        periodSeconds: 15
---
# Granite 20B Code Instruct モデルの InferenceService
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-20b-code-instruct
  namespace: redhat-ods-applications
  labels:
    app: granite-20b-code-instruct
  annotations:
    serving.knative.openshift.io/enablePassthrough: "true"
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/rewriteAppHTTPProbers: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 2
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: "pvc://model-storage/granite-20b-code-instruct"
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
---
# モデルストレージ用 PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage
  namespace: redhat-ods-applications
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ocs-storagecluster-ceph-rbd
  resources:
    requests:
      storage: 100Gi
