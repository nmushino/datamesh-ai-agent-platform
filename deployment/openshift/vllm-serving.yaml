# vLLM ServingRuntime (OpenShift AI / RHOAI)
# NOTE: namespace はここでは指定しない。`oc apply -n <namespace>` 側で指定すること。
# redhat-ods-applications は RHOAI が自動生成する保護対象の namespace のため、
# ユーザーが InferenceService 等を直接作成することはできない。
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-runtime
  labels:
    app: vllm-runtime
spec:
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: quay.io/rh-aiservices-bu/vllm-openai-ubi9:0.4.2
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - "--model=/mnt/models"
        - "--dtype=float16"
        - "--max-model-len=8192"
        - "--tensor-parallel-size=1"
        - "--served-model-name=$(MODEL_NAME)"
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: "32Gi"
          nvidia.com/gpu: "1"
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 120
        periodSeconds: 10
        failureThreshold: 10
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 180
        periodSeconds: 15
---
# モデルの InferenceService
# NOTE: name / storageUri 内のモデル名は plaeholder "MODEL_DISPLAY_NAME_PLACEHOLDER"。
# 適用前に呼び出し側 (aiagent.sh) で実際のモデル名に置換すること。
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: MODEL_DISPLAY_NAME_PLACEHOLDER
  labels:
    app: MODEL_DISPLAY_NAME_PLACEHOLDER
  annotations:
    serving.knative.openshift.io/enablePassthrough: "true"
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/rewriteAppHTTPProbers: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 2
    model:
      modelFormat:
        name: vLLM
      runtime: vllm-runtime
      storageUri: "pvc://model-storage/MODEL_DISPLAY_NAME_PLACEHOLDER"
      resources:
        requests:
          nvidia.com/gpu: "1"
        limits:
          nvidia.com/gpu: "1"
---
# モデルストレージ用 PVC
# NOTE: storageClassName はクラスターのデフォルト StorageClass に任せる
# (ocs-storagecluster-ceph-rbd は OpenShift Data Foundation 環境専用のため、
#  AWS/EBS 等の環境ではデフォルト StorageClass を明示的に上書きすること)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
