# ===================================================================
# Secret テンプレート — 実際の値を設定してから apply すること
# 本ファイルは Git にコミットしないこと (値はプレースホルダー)
# ===================================================================

# OpenMetadata JWT トークン
# 取得方法: OpenMetadata UI > Settings > Bots > ingestion-bot > Token
---
apiVersion: v1
kind: Secret
metadata:
  name: openmetadata-secret
  namespace: ai-agent-platform
type: Opaque
stringData:
  jwt-token: "<OPENMETADATA_JWT_TOKEN>"

# PostgreSQL パスワード
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: ai-agent-platform
type: Opaque
stringData:
  password: "<POSTGRESQL_PASSWORD>"

# AI Agent の LangGraph チェックポイント用 DB URL
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-db-secret
  namespace: ai-agent-platform
type: Opaque
stringData:
  url: "postgresql://postgres:<PASSWORD>@postgresql:5432/agentdb"

# Keycloak クライアントシークレット
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: ai-agent-platform
type: Opaque
stringData:
  client-secret: "<KEYCLOAK_CLIENT_SECRET>"

# Quay.io コンテナレジストリ認証情報
---
apiVersion: v1
kind: Secret
metadata:
  name: quay-credentials
  namespace: ai-agent-platform
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "quay.io": {
          "username": "<QUAY_USERNAME>",
          "password": "<QUAY_PASSWORD>",
          "auth": "<BASE64_AUTH>"
        }
      }
    }

# GitHub Webhook シークレット (Tekton Triggers)
---
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-secret
  namespace: ai-agent-platform
type: Opaque
stringData:
  secret: "<GITHUB_WEBHOOK_SECRET>"

# GitHub Personal Access Token (GitOps 更新用)
---
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: ai-agent-platform
type: Opaque
stringData:
  token: "<GITHUB_PAT>"
