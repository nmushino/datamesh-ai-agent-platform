apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-agent-prod
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: enterprise-ai-agent-platform
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/quarkusdroneshop/enterprise-ai-agent-platform
    targetRevision: main
    path: deployment/kustomize/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-agent-platform-prod
  syncPolicy:
    # 本番: 自動同期は無効。手動承認後に同期する
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
