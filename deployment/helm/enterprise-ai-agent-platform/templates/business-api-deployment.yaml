{{- if .Values.businessApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    {{- include "businessApi.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.businessApi.replicas }}
  selector:
    matchLabels:
      {{- include "businessApi.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        {{- include "businessApi.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/q/metrics"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: business-api-sa
      containers:
        - name: business-api
          image: {{ .Values.global.imageRegistry }}/{{ .Values.businessApi.image.name }}:{{ .Values.businessApi.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DB_HOST
              value: {{ .Values.businessApi.env.dbHost | quote }}
            - name: DB_NAME
              value: {{ .Values.businessApi.env.dbName | quote }}
            - name: DB_USERNAME
              value: {{ .Values.businessApi.env.dbUsername | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.businessApi.env.kafkaBootstrapServers | quote }}
            - name: OPENMETADATA_HOST
              value: {{ .Values.businessApi.env.openmetadataHost | quote }}
            - name: OPENMETADATA_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-secret
                  key: jwt-token
            - name: KEYCLOAK_URL
              value: {{ .Values.businessApi.env.keycloakUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.businessApi.env.keycloakRealm | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: client-secret
          resources:
            {{- toYaml .Values.businessApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: business-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "businessApi.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- if .Values.businessApi.route.expose }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: business-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: business-api
  port:
    targetPort: http
  {{- if .Values.businessApi.route.tls }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  {{- end }}
{{- end }}
{{- if .Values.businessApi.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: business-api-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: business-api
  minReplicas: {{ .Values.businessApi.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.businessApi.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.businessApi.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
