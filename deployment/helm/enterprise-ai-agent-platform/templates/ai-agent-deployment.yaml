{{- if .Values.aiAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    {{- include "aiAgent.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.aiAgent.replicas }}
  selector:
    matchLabels:
      {{- include "aiAgent.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        {{- include "aiAgent.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: ai-agent-sa
      containers:
        - name: orchestrator
          image: {{ .Values.global.imageRegistry }}/{{ .Values.aiAgent.image.name }}:{{ .Values.aiAgent.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: VLLM_BASE_URL
              value: {{ .Values.aiAgent.env.vllmBaseUrl | quote }}
            - name: VLLM_MODEL
              value: {{ .Values.aiAgent.env.vllmModel | quote }}
            - name: OPENMETADATA_HOST
              value: {{ .Values.aiAgent.env.openmetadataHost | quote }}
            - name: BUSINESS_API_URL
              value: {{ .Values.aiAgent.env.businessApiUrl | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.aiAgent.env.kafkaBootstrapServers | quote }}
            - name: OPENMETADATA_JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openmetadata-secret
                  key: jwt-token
            - name: AGENT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: agent-db-secret
                  key: url
          resources:
            {{- toYaml .Values.aiAgent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "aiAgent.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
{{- if .Values.aiAgent.route.expose }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ai-agent-orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: ai-agent-orchestrator
  port:
    targetPort: http
  {{- if .Values.aiAgent.route.tls }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  {{- end }}
{{- end }}
{{- if .Values.aiAgent.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-agent-orchestrator-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-agent-orchestrator
  minReplicas: {{ .Values.aiAgent.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.aiAgent.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.aiAgent.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
