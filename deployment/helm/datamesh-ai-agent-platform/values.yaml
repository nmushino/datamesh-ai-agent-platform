global:
  namespace: ai-agent-platform
  imageRegistry: quay.io/droneplatform
  imagePullPolicy: IfNotPresent

# ===== AI Agent (Python / LangGraph) =====
aiAgent:
  enabled: true
  image:
    name: ai-agent-orchestrator
    tag: latest
  replicas: 2
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    vllmBaseUrl: "http://granite-predictor/v1"
    vllmModel: "ibm-granite-20b-code-instruct"
    openmetadataHost: "http://openmetadata:8585"
    businessApiUrl: "http://business-api:8080"
    kafkaBootstrapServers: "kafka:9092"
  secrets:
    openmetadataJwtToken: ""  # Secret から参照
    agentDbUrl: ""            # Secret から参照
  route:
    expose: true
    tls: true

# ===== Business API (Quarkus) =====
businessApi:
  enabled: true
  image:
    name: business-api
    tag: latest
  replicas: 2
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  env:
    dbHost: "postgresql"
    dbName: "dronedb"
    dbUsername: "postgres"
    kafkaBootstrapServers: "kafka:9092"
    openmetadataHost: "http://openmetadata:8585"
    keycloakUrl: "http://keycloak:8080"
    keycloakRealm: "drone-platform"
  route:
    expose: true
    tls: true

# ===== PostgreSQL =====
postgresql:
  enabled: true
  image: registry.redhat.io/rhel9/postgresql-15:latest
  storage:
    size: 50Gi
    storageClass: ocs-storagecluster-ceph-rbd
  env:
    user: postgres
    database: dronedb

# ===== OpenMetadata =====
openmetadata:
  enabled: true
  image: docker.getcollate.io/openmetadata/server:1.3.0
  storage:
    size: 20Gi
    storageClass: ocs-storagecluster-ceph-rbd
  route:
    expose: true
    tls: true

# ===== NetworkPolicy =====
networkPolicy:
  enabled: true
