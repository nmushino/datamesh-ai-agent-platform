{{- if .Values.networkPolicy.enabled }}
---
# AI Agent: chat-ui / RHDH からの受信のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-ingress
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app: ai-agent-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: chat-ui
        - podSelector:
            matchLabels:
              app: rhdh-backend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: openmetadata
      ports:
        - port: 8585
    - to:
        - podSelector:
            matchLabels:
              app: business-api
      ports:
        - port: 8080
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
    # vLLM (RHOAI namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redhat-ods-applications
      ports:
        - port: 8080
    # PostgreSQL (チェックポイント)
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # DNS
    - ports:
        - port: 53
          protocol: UDP
---
# Business API: ai-agent からの受信のみ許可
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: business-api-ingress
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app: business-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ai-agent-orchestrator
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: openmetadata
      ports:
        - port: 8585
    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 8080
    - ports:
        - port: 53
          protocol: UDP
{{- end }}
