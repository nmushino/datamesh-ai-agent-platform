global:
  namespace: ai-agent-platform

aiAgent:
  replicas: 3
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

businessApi:
  replicas: 3
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"

postgresql:
  storage:
    size: 100Gi

openmetadata:
  storage:
    size: 50Gi
