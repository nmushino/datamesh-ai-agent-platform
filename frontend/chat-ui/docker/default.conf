server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 実行時に書き換える config.js だけは書き込み可能な /tmp から配信する
    location = /config.js {
        alias /tmp/runtime-config/config.js;
    }

    # index.html はデプロイのたびに参照する JS/CSS のハッシュ付きファイル名が
    # 変わるため、ブラウザにキャッシュされると新しいデプロイが反映されない
    # (実際に発生: 修正済みのコードがサーバー側にはあるのに古いバンドルを
    # 参照し続ける不具合の原因になっていた)。index.html 自体は常に再検証させる。
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
